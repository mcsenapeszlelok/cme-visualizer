        function computeSolarParameters(dateStr) {
          const d = new Date(dateStr);
          const dayOfYear = Math.floor((d - new Date(d.getFullYear(), 0, 0)) / (1000 * 60 * 60 * 24));
          const P = 26.3 * Math.sin((2 * Math.PI * (dayOfYear - 105)) / 365.25);
          const B0 = 7.25 * Math.sin((2 * Math.PI * (dayOfYear - 250)) / 365.25);
          const baseEpochMs = new Date('2026-01-01T00:00:00Z').getTime();
          const diffMs = d.getTime() - baseEpochMs;
          const days = diffMs / (1000 * 60 * 60 * 24);
          const rotationPeriodDays = 27.2753;
          const L0 = (360 - ((days % rotationPeriodDays) / rotationPeriodDays) * 360) % 360;

          return {
            P: parseFloat(P.toFixed(2)),
            B0: parseFloat(B0.toFixed(2)),
            L0: parseFloat(L0.toFixed(1))
          };
        }

          useEffect(() => {
            const backupData = lang === 'hu' ? DATA_HU : DATA_EN;
            setCmeList(prev => {
              return prev.map(item => {
                const found = backupData.find(b => b.activityID === item.activityID);
                return found ? found : item;
              });
            });
            setSelectedCme(prev => {
              if (!prev) return null;
              const found = backupData.find(b => b.activityID === prev.activityID);
              return found ? found : prev;
            });
          }, [lang]);

          const orbitCanvasRef = useRef(null);
          const sunDiskCanvasRef = useRef(null);
          const fullscreenSunDiskCanvasRef = useRef(null);
          const fullscreenOrbitCanvasRef = useRef(null);

          useEffect(() => {
            let animationFrameId;
            if (isSimPlaying) {
              const update = () => {
                setSimTime((prev) => (prev + 0.3 * simulationSpeed) % 100);
                animationFrameId = requestAnimationFrame(update);
              };
              animationFrameId = requestAnimationFrame(update);
            }
            return () => cancelAnimationFrame(animationFrameId);
          }, [isSimPlaying, simulationSpeed]);

          useEffect(() => {
            const handleKeyDown = (e) => {
              if (e.key === 'Escape') {
                setFullscreenElement(null);
              }
            };
            window.addEventListener('keydown', handleKeyDown);
            return () => window.removeEventListener('keydown', handleKeyDown);
          }, []);

          const renderOrbitCanvas = (canvas) => {
            if (!canvas) return;
            const ctx = canvas.getContext('2d');
            const width = canvas.width;
            const height = canvas.height;

            ctx.fillStyle = '#060a13';
            ctx.fillRect(0, 0, width, height);

            ctx.fillStyle = 'rgba(255, 255, 255, 0.35)';
            for (let i = 0; i < 40; i++) {
              const x = (Math.sin(i * 99) * 0.5 + 0.5) * width;
              const y = (Math.cos(i * 144) * 0.5 + 0.5) * height;
              ctx.fillRect(x, y, 1.2, 1.2);
            }

            const centerX = width / 2;
            const centerY = height / 2;
            const sunRadius = width * 0.06;

            ctx.strokeStyle = 'rgba(255, 255, 255, 0.08)';
            ctx.lineWidth = 1;
            const earthOrbitRadius = width * 0.38;
            ctx.beginPath();
            ctx.arc(centerX, centerY, earthOrbitRadius, 0, Math.PI * 2);
            ctx.stroke();

            const innerOrbitRadius = width * 0.18;
            const outerOrbitRadius = width * 0.31;
            ctx.beginPath();
            ctx.arc(centerX, centerY, innerOrbitRadius, 0, Math.PI * 2);
            ctx.arc(centerX, centerY, outerOrbitRadius, 0, Math.PI * 2);
            ctx.stroke();

            const sunGradient = ctx.createRadialGradient(centerX, centerY, 3, centerX, centerY, sunRadius);
            sunGradient.addColorStop(0, '#fffdf0');
            sunGradient.addColorStop(0.3, '#eab308');
            sunGradient.addColorStop(1, 'rgba(239, 68, 68, 0)');
            ctx.fillStyle = sunGradient;
            ctx.beginPath();
            ctx.arc(centerX, centerY, sunRadius * 1.8, 0, Math.PI * 2);
            ctx.fill();

            ctx.fillStyle = '#f59e0b';
            ctx.beginPath();
            ctx.arc(centerX, centerY, sunRadius * 0.6, 0, Math.PI * 2);
            ctx.fill();

            if (selectedCme) {
              const analysis = selectedCme.cmeAnalyses?.[0] || {};
              const angleDeg = analysis.longitude !== undefined ? analysis.longitude : 0; 
              const halfAngleDeg = analysis.halfAngle !== undefined ? analysis.halfAngle : 45;
              const speed = analysis.speed || 500;
              
              const centerAngleRad = (angleDeg * Math.PI) / 180;
              const spreadRad = (halfAngleDeg * Math.PI) / 180;
              const currentRadius = (simTime / 100) * (earthOrbitRadius + 25);

              if (currentRadius > sunRadius) {
                ctx.beginPath();
                const startRad = centerAngleRad - spreadRad;
                const endRad = centerAngleRad + spreadRad;
                ctx.arc(centerX, centerY, currentRadius, startRad, endRad);
                ctx.lineTo(centerX, centerY);
                ctx.closePath();

                const cmeGradient = ctx.createRadialGradient(centerX, centerY, sunRadius, centerX, centerY, currentRadius);
                if (speed >= 1000) {
                  cmeGradient.addColorStop(0, 'rgba(239, 68, 68, 0.04)');
                  cmeGradient.addColorStop(0.8, 'rgba(239, 68, 68, 0.38)');
                  cmeGradient.addColorStop(1, 'rgba(255, 255, 255, 0.75)');
                  ctx.strokeStyle = 'rgba(255, 255, 255, 0.65)';
                } else {
                  cmeGradient.addColorStop(0, 'rgba(245, 158, 11, 0.04)');
                  cmeGradient.addColorStop(0.8, 'rgba(245, 158, 11, 0.28)');
                  cmeGradient.addColorStop(1, 'rgba(239, 68, 68, 0.55)');
                  ctx.strokeStyle = 'rgba(239, 68, 68, 0.45)';
                }
                
                ctx.fillStyle = cmeGradient;
                ctx.fill();
                ctx.lineWidth = 1;
                ctx.stroke();
              }
            }

            const earthX = centerX + earthOrbitRadius;
            const earthY = centerY;
            ctx.fillStyle = '#3b82f6';
            ctx.beginPath();
            ctx.arc(earthX, earthY, 6, 0, Math.PI * 2);
            ctx.fill();
            ctx.strokeStyle = 'rgba(59, 130, 246, 0.4)';
            ctx.lineWidth = 2.5;
            ctx.beginPath();
            ctx.arc(earthX, earthY, 9, 0, Math.PI * 2);
            ctx.stroke();

            ctx.fillStyle = '#cbd5e1';
            ctx.font = 'bold 10px sans-serif';
            ctx.fillText(lang === 'hu' ? 'Föld' : 'Earth', earthX + 12, earthY + 3);

            const pspX = centerX + Math.cos(Math.PI / 4) * innerOrbitRadius;
            const pspY = centerY + Math.sin(Math.PI / 4) * innerOrbitRadius;
            ctx.fillStyle = '#ec4899';
            ctx.beginPath();
            ctx.arc(pspX, pspY, 3.5, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillText('PSP', pspX + 6, pspY - 4);

            const juiceX = centerX + Math.cos(Math.PI * 1.6) * outerOrbitRadius;
            const juiceY = centerY + Math.sin(Math.PI * 1.6) * outerOrbitRadius;
            ctx.fillStyle = '#a855f7';
            ctx.beginPath();
            ctx.arc(juiceX, juiceY, 3.5, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillText('Juice', juiceX + 6, juiceY + 3);

            const clipperX = centerX + Math.cos(Math.PI * 1.8) * outerOrbitRadius;
            const clipperY = centerY + Math.sin(Math.PI * 1.8) * outerOrbitRadius;
            ctx.fillStyle = '#14b8a6';
            ctx.beginPath();
            ctx.arc(clipperX, clipperY, 3.5, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillText('Clipper', clipperX + 6, clipperY - 4);
          };

          useEffect(() => {
            if (fullscreenElement === 'orbit') {
              renderOrbitCanvas(fullscreenOrbitCanvasRef.current);
            } else {
              renderOrbitCanvas(orbitCanvasRef.current);
            }
          }, [simTime, selectedCme, lang, fullscreenElement]);

          const projectCoordinatesToEndDate = (cme, targetDateStr) => {
            const analysis = cme.cmeAnalyses?.[0];
            if (!analysis) return { latitude: 0, longitude: 0, originalLat: 0, originalLon: 0, dtDays: 0 };

            const originalLat = analysis.latitude !== undefined ? analysis.latitude : 0;
            const originalLon = analysis.longitude !== undefined ? analysis.longitude : 0;

            const startMs = new Date(cme.startTime).getTime();
            const targetMs = new Date(targetDateStr).getTime();
            const dtMs = targetMs - startMs;
            const dtDays = dtMs / (1000 * 60 * 60 * 24);

            const rotationRatePerDay = 13.2; 
            let projectedLon = originalLon + (rotationRatePerDay * dtDays);

            while (projectedLon > 180) projectedLon -= 360;
            while (projectedLon < -180) projectedLon += 360;

            return {
              latitude: originalLat, 
              longitude: parseFloat(projectedLon.toFixed(1)),
              originalLat,
              originalLon,
              dtDays: parseFloat(dtDays.toFixed(2))
            };
          };

          const renderSunDiskCanvas = (canvas) => {
            if (!canvas) return;
            const ctx = canvas.getContext('2d');
            const width = canvas.width;
            const height = canvas.height;

            ctx.fillStyle = '#060a13';
            ctx.fillRect(0, 0, width, height);

            const centerX = width / 2;
            const centerY = height / 2;
            const sunRadius = width * 0.34;

            const backGlow = ctx.createRadialGradient(centerX, centerY, sunRadius * 0.9, centerX, centerY, sunRadius * 1.35);
            backGlow.addColorStop(0, 'rgba(245, 158, 11, 0.22)');
            backGlow.addColorStop(1, 'rgba(239, 68, 68, 0)');
            ctx.fillStyle = backGlow;
            ctx.beginPath();
            ctx.arc(centerX, centerY, sunRadius * 1.35, 0, Math.PI * 2);
            ctx.fill();

            const sunBase = ctx.createRadialGradient(centerX, centerY, 0, centerX, centerY, sunRadius);
            sunBase.addColorStop(0, '#fef08a');
            sunBase.addColorStop(0.72, '#f59e0b');
            sunBase.addColorStop(1, '#b45309');
            ctx.fillStyle = sunBase;
            ctx.beginPath();
            ctx.arc(centerX, centerY, sunRadius, 0, Math.PI * 2);
            ctx.fill();

            const tiltAngleDeg = endParams.P;
            const tiltRad = (tiltAngleDeg * Math.PI) / 180;

            ctx.save();
            ctx.translate(centerX, centerY);
            ctx.rotate(tiltRad);

            ctx.strokeStyle = 'rgba(0, 0, 0, 0.12)';
            ctx.lineWidth = 1;

            for (let lat = -80; lat <= 80; lat += 10) {
              if (lat === 0) continue;
              const latRad = (lat * Math.PI) / 180;
              const y = Math.sin(latRad) * sunRadius;
              const r = Math.cos(latRad) * sunRadius;

              ctx.beginPath();
              ctx.ellipse(0, y, r, r * 0.15, 0, 0, Math.PI * 2);
              ctx.stroke();
            }

            for (let lon = -80; lon <= 80; lon += 10) {
              if (lon === 0) continue;
              const lonRad = (lon * Math.PI) / 180;
              const rX = Math.sin(lonRad) * sunRadius;

              ctx.beginPath();
              ctx.ellipse(0, 0, Math.abs(rX), sunRadius, 0, 0, Math.PI * 2);
              ctx.stroke();
            }

            ctx.strokeStyle = 'rgba(0, 0, 0, 0.35)';
            ctx.lineWidth = 1.6;
            ctx.beginPath();
            ctx.ellipse(0, 0, sunRadius, sunRadius * 0.15, 0, 0, Math.PI * 2);
            ctx.stroke();

            ctx.beginPath();
            ctx.moveTo(0, -sunRadius);
            ctx.lineTo(0, sunRadius);
            ctx.stroke();

            ctx.strokeStyle = '#ef4444';
            ctx.lineWidth = 2.2;
            ctx.beginPath();
            ctx.moveTo(0, -sunRadius - 15);
            ctx.lineTo(0, sunRadius + 15);
            ctx.stroke();

            ctx.fillStyle = '#ef4444';
            ctx.font = 'bold 12px monospace';
            ctx.textAlign = 'center';
            ctx.fillText('P', 0, -sunRadius - 22);

            ctx.restore();

            ctx.fillStyle = '#94a3b8';
            ctx.font = 'bold 13px sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('N', centerX, centerY - sunRadius - 18);
            ctx.fillText('E', centerX - sunRadius - 18, centerY);

            ctx.fillStyle = '#22c55e'; 
            ctx.strokeStyle = 'rgba(34, 197, 94, 0.4)';
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.arc(centerX, centerY, 5, 0, Math.PI * 2);
            ctx.fill();
            ctx.stroke();

            const getCanvasCoords = (lat, lon) => {
              const latRad = (lat * Math.PI) / 180;
              const lonRad = (lon * Math.PI) / 180;

              let x3d = sunRadius * Math.cos(latRad) * Math.sin(lonRad);
              let y3d = -sunRadius * Math.sin(latRad);
              let z3d = sunRadius * Math.cos(latRad) * Math.cos(lonRad);

              const isFront = z3d >= 0;
              const xRot = x3d * Math.cos(-tiltRad) - y3d * Math.sin(-tiltRad);
              const yRot = x3d * Math.sin(-tiltRad) + y3d * Math.cos(-tiltRad);

              return { x: centerX + xRot, y: centerY + yRot, isFront };
            };

            const itemsToRender = mapAllCmes ? cmeList : (selectedCme ? [selectedCme] : []);

            itemsToRender.forEach((cme) => {
              const projection = projectCoordinatesToEndDate(cme, endDate);
              const pos = getCanvasCoords(projection.latitude, projection.longitude);
              const isSelected = selectedCme?.activityID === cme.activityID;

              if (pos.isFront && Math.abs(projection.longitude) <= 90) {
                ctx.strokeStyle = '#f87171';
                ctx.lineWidth = isSelected ? 2.5 : 1.5;
                
                ctx.beginPath();
                ctx.arc(pos.x, pos.y, isSelected ? 9 : 6, 0, Math.PI * 2);
                ctx.stroke();

                ctx.beginPath();
                ctx.moveTo(pos.x - (isSelected ? 15 : 10), pos.y);
                ctx.lineTo(pos.x + (isSelected ? 15 : 10), pos.y);
                ctx.moveTo(pos.x, pos.y - (isSelected ? 15 : 10));
                ctx.lineTo(pos.x, pos.y + (isSelected ? 15 : 10));
                ctx.stroke();

                ctx.fillStyle = isSelected ? '#ffffff' : '#ef4444';
                ctx.beginPath();
                ctx.arc(pos.x, pos.y, isSelected ? 3.5 : 2.5, 0, Math.PI * 2);
                ctx.fill();

                ctx.fillStyle = '#ffffff';
                ctx.font = 'bold 9px monospace';
                ctx.fillText(cme.sourceLocation || 'AR', pos.x, pos.y - (isSelected ? 18 : 13));
              }
            });
          };

              renderSunDiskCanvas(fullscreenSunDiskCanvasRef.current);

            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;

            setMousePos({ x: e.clientX, y: e.clientY });

            const centerY = canvas.height / 2;
            const sunRadius = canvas.width * 0.34;

              const latRad = (lat * Math.PI) / 180;
              const lonRad = (lon * Math.PI) / 180;
              let x3d = sunRadius * Math.cos(latRad) * Math.sin(lonRad);
              let y3d = -sunRadius * Math.sin(latRad);
              const xRot = x3d * Math.cos(-tiltRad) - y3d * Math.sin(-tiltRad);
              const yRot = x3d * Math.sin(-tiltRad) + y3d * Math.cos(-tiltRad);
              return { x: centerX + xRot, y: centerY + yRot };
            };

                                  <p><strong className="text-slate-400">{lang === 'hu' ? 'Napfolt' : 'AR Region'}:</strong> {hoveredCmeDisk.sourceLocation || 'N/A'}</p>
                                  <p><strong className="text-slate-400">{lang === 'hu' ? 'Eruptív sebesség' : 'Blast Speed'}:</strong> {hoveredCmeDisk.cmeAnalyses?.[0]?.speed || 'n.a.'} km/s</p>
                                  
                                  <div className="mt-2 pt-2 border-t border-slate-800 space-y-1 text-slate-200">
                                    <p className="text-[10px] text-amber-500 font-bold uppercase tracking-tight">
                                      {lang === 'hu' ? '1. Koordináták a kitöréskor:' : '1. Original Eruption coords:'}
                                    </p>
                                    <p className="font-mono bg-slate-900/60 p-1 rounded border border-slate-800/50 font-sans">
                                      Lat: {projectCoordinatesToEndDate(hoveredCmeDisk, endDate).originalLat}°, Lon: {projectCoordinatesToEndDate(hoveredCmeDisk, endDate).originalLon}°
                                    </p>
                                    
                                    <p className="text-[10px] text-green-400 font-bold uppercase tracking-tight mt-1.5">
                                      {lang === 'hu' ? '2. Átszámított (Záró dátum szerint):' : '2. Projected (At End Date):'}
                                    </p>
                                    <p className="font-mono bg-slate-900/60 p-1 rounded border border-slate-800/50 text-green-300 font-sans">
                                      Lat: {projectCoordinatesToEndDate(hoveredCmeDisk, endDate).latitude}°, Lon: {projectCoordinatesToEndDate(hoveredCmeDisk, endDate).longitude}°
                                    </p>
                                    <p className="text-[9px] text-slate-400 italic">
                                      {lang === 'hu' 
                                        ? `Eltérés: +${projectCoordinatesToEndDate(hoveredCmeDisk, endDate).dtDays} nap szoláris rotáció` 
                                        : `Drift span: +${projectCoordinatesToEndDate(hoveredCmeDisk, endDate).dtDays} days solar rotation`}
                                    </p>
                                  </div>
                                </div>
                              </div>
                            )}
                          </div>
                          
                          <div className="w-full mt-3 bg-slate-950/80 p-3 rounded-lg border border-slate-800 text-[11px] text-slate-300 space-y-1 flex flex-col">
                            <div className="flex justify-between items-center text-slate-400 font-semibold border-b border-slate-900 pb-1 mb-1">
                              <span>{lang === 'hu' ? 'Számított napfizikai értékek:' : 'Calculated Ephemeris:'}</span>
                              <span className="text-amber-500 font-mono">{endDate}</span>
                            </div>
                            <div className="grid grid-cols-3 text-center">
                              <div>
                                <span className="block text-slate-500 text-[10px]">B₀ (Tilt)</span>
                                <span className="font-mono text-green-400 font-semibold">{endParams.B0}°</span>
                              </div>
                              <div>
                                <span className="block text-slate-500 text-[10px]">L₀ (Carrington)</span>
                                <span className="font-mono text-green-400 font-semibold">{endParams.L0}°</span>
                              </div>
                              <div>
                                <span className="block text-slate-500 text-[10px]">P (Axis Angle)</span>
                                <span className="font-mono text-green-400 font-semibold">{endParams.P}°</span>
                              </div>
                            </div>
                          </div>
                        </div>

                        {}
                        <div className="bg-slate-900 border border-slate-800 rounded-xl p-5 shadow-xl flex flex-col items-center justify-between">
                          <div className="w-full flex justify-between items-center mb-4">
                            <h3 className="text-xs font-bold uppercase tracking-wider text-slate-400">
                              {lang === 'hu' ? 'Heliocentrikus szimuláció (HEEQ)' : 'Heliocentric Orbit Simulation'}
                            </h3>
                            <div className="flex items-center gap-2">
                              <button 
                                onClick={() => setIsSimPlaying(!isSimPlaying)}
                                className="p-1 rounded bg-slate-800 hover:bg-slate-700 text-amber-400"
                              >
                                {isSimPlaying ? (
                                  <svg className="w-4 h-4" fill="currentColor" viewBox="0 0 20 20"><path fillRule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zM7 8a1 1 0 012 0v4a1 1 0 11-2 0V8zm5-1a1 1 0 00-1 1v4a1 1 0 102 0V8a1 1 0 00-1-1z" clipRule="evenodd" /></svg>
                                ) : (
                                  <svg className="w-4 h-4" fill="currentColor" viewBox="0 0 20 20"><path fillRule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM9.555 7.168A1 1 0 008 8v4a1 1 0 001.555.832l3-2a1 1 0 000-1.664l-3-2z" clipRule="evenodd" /></svg>
                                )}
                              </button>
                              <button 
                                onClick={() => setSimTime(0)}
                                className="p-1 rounded bg-slate-800 hover:bg-slate-700 text-slate-300"
                              >
                                <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2.5" d="M4 4v5h.582m15.356 2A8.001 8.001 0 1121.21 15H18.5" /></svg>
                              </button>

                              <button 
                                onClick={() => setFullscreenElement(fullscreenElement === 'orbit' ? null : 'orbit')}
                                className="text-slate-400 hover:text-slate-200 p-1.5 rounded bg-slate-800 hover:bg-slate-700"
                              >
                                <svg className="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2.5" d="M4 8V4m0 0h4M4 4l5 5m11-5h-4m4 0v4m0-4l-5 5M4 20v-4m0 4h4m-4 0l5-5m11 5h-4m4 0v-4m0 4l-5-5" /></svg>
                              </button>
                            </div>
                          </div>

                          <div className="relative border border-slate-800/80 rounded-lg overflow-hidden bg-slate-950 w-full flex justify-center">
                            <canvas 
                              ref={orbitCanvasRef} 
                              width={320} 
                              height={320} 
                              className="max-w-full aspect-square"
                            />
                            <div className="absolute bottom-2 left-2 text-[10px] text-slate-400 bg-slate-950/80 px-2 py-1 rounded border border-slate-800 font-sans">
                              {lang === 'hu' ? 'Idő' : 'Time'}: <span className="font-mono text-amber-400">{Math.round(simTime)}h</span>
                            </div>
                          </div>

                          <div className="w-full mt-4 flex items-center justify-between gap-4 font-sans">
                            <span className="text-xs text-slate-400 font-medium">
                              {lang === 'hu' ? 'Animáció sebesség:' : 'Propagation Speed:'}
                            </span>
                            <div className="flex gap-1.5">
                              {[0.5, 1, 2, 5].map((s) => (
                                <button
                                  key={s}
                                  onClick={() => setSimulationSpeed(s)}
                                  className={`text-[10px] px-2 py-1 rounded font-bold transition ${
                                    simulationSpeed === s ? 'bg-amber-500 text-slate-950' : 'bg-slate-800 hover:bg-slate-700 text-slate-300'
                                  }`}
                                >
                                  {s}x
                                </button>
                              ))}
                            </div>
                          </div>
                        </div>

                      </div>

                      {}
                      <div className="bg-slate-900 border border-slate-800 rounded-xl p-5 shadow-xl flex flex-col justify-between font-sans">
                        <div>
                          <div className="flex justify-between items-center mb-3">
                            <span className="text-[10px] font-bold text-amber-500 tracking-widest uppercase">
                              {lang === 'hu' ? 'Esemény Spektrális és Fizikai Adatai' : 'CME Physical & Spectral parameters'}
                            </span>
                            <a 
                              href={selectedCme?.link} 
                              target="_blank" 
                              rel="noopener noreferrer" 
                              className="text-[10px] text-slate-400 hover:text-slate-200 underline flex items-center gap-1"
                            >
                              NASA DONKI Portal ↗
                            </a>
                          </div>

                          <h3 className="text-lg font-bold text-slate-100 mb-2">{selectedCme?.activityID}</h3>
                          <p className="text-xs text-slate-300 leading-relaxed mb-4">{selectedCme?.note}</p>

                          <div className="grid grid-cols-2 sm:grid-cols-4 gap-3 mb-4">
                            <div className="bg-slate-950/50 p-2.5 rounded border border-slate-800/80">
                              <span className="block text-[10px] text-slate-400">{lang === 'hu' ? 'Kezdeti Sebesség' : 'Launch Velocity'}</span>
                              <span className="text-sm font-mono font-bold text-slate-100">
                                {selectedCme?.cmeAnalyses?.[0]?.speed ? `${selectedCme.cmeAnalyses[0].speed} km/s` : 'N/A'}
                              </span>
                            </div>

                            <div className="bg-slate-950/50 p-2.5 rounded border border-slate-800/80">
                              <span className="block text-[10px] text-slate-400">{lang === 'hu' ? 'Flare Osztály' : 'Solar Flare'}</span>
                              <span className="text-sm font-mono font-bold text-red-400">
                                {selectedCme?.cmeAnalyses?.[0]?.associatedFeatures?.[0]?.classType || 'Class N/A'}
                              </span>
                            </div>

                            <div className="bg-slate-950/50 p-2.5 rounded border border-slate-800/80">
                              <span className="block text-[10px] text-slate-400">{lang === 'hu' ? 'Fél-nyílásszög' : 'Half-angle'}</span>
                              <span className="text-sm font-mono font-bold text-slate-100">
                                {selectedCme?.cmeAnalyses?.[0]?.halfAngle ? `${selectedCme.cmeAnalyses[0].halfAngle}°` : 'N/A'}
                              </span>
                            </div>

                            <div className="bg-slate-950/50 p-2.5 rounded border border-slate-800/80">
                              <span className="block text-[10px] text-slate-400">{lang === 'hu' ? 'HEEQ Szél/Hossz' : 'HEEQ Lat/Lon'}</span>
                              <span className="text-sm font-mono font-bold text-slate-100">
                                {selectedCme?.cmeAnalyses?.[0]?.longitude !== undefined 
                                  ? `${selectedCme.cmeAnalyses[0].latitude}° / ${selectedCme.cmeAnalyses[0].longitude}°` 
                                  : 'N/A'}
                              </span>
                            </div>
                          </div>
                        </div>

                        <div className="border-t border-slate-800 pt-3">
                          <span className="block text-[10px] text-slate-400 mb-1.5 uppercase tracking-wider">
                            {lang === 'hu' ? 'Regisztrált mérőműszerek' : 'Instrumentation & Coronagraphs'}
                          </span>
                          <div className="flex flex-wrap gap-1.5">
                            {selectedCme?.instruments?.map((inst, i) => (
                              <span key={i} className="text-[10px] bg-slate-800 px-2 py-0.5 rounded text-slate-300 font-mono">
                                {inst.displayName}
                              </span>
                            ))}
                          </div>
                        </div>

                      </div>

                    </div>
                  )}

                  {activeTab === 'raw_json' && (
                    <div className="bg-slate-900 border border-slate-800 rounded-xl p-5 shadow-xl flex-1 flex flex-col font-sans">
                      <div className="flex justify-between items-center mb-3">
                        <div>
                          <h3 className="text-sm font-bold text-slate-300 uppercase tracking-wider">{lang === 'hu' ? 'NASA API JSON Adatok' : 'NASA API JSON Response'}</h3>
                          <p className="text-xs text-slate-500">
                            {lang === 'hu' ? 'Valós idejű válaszadatok a Space Weather adatbázisból' : 'Serialized parameters directly from DONKI systems'}
                          </p>
                        </div>
                        <button
                          onClick={() => {
                            navigator.clipboard.writeText(JSON.stringify(selectedCme, null, 2));
                          }}
                          className="text-xs bg-slate-800 hover:bg-slate-700 text-slate-300 px-3 py-1 rounded transition border border-slate-700"
                        >
                          {lang === 'hu' ? 'Másolás' : 'Copy'}
                        </button>
                      </div>

                      <div className="flex-1 min-h-[350px] bg-slate-950 rounded-lg p-4 border border-slate-800 font-mono text-xs overflow-auto">
                        <pre className="text-amber-300">{JSON.stringify(selectedCme, null, 2)}</pre>
                      </div>
                    </div>
                  )}

                  {activeTab === 'glossary' && (
                    <div className="bg-slate-900 border border-slate-800 rounded-xl p-5 shadow-xl font-sans">
                      <h3 className="text-sm font-bold text-slate-300 uppercase tracking-wider mb-4">
                        {lang === 'hu' ? 'Űridőjárás Fogalomtár & Tudományos Források' : 'Space Weather Reference Library'}
                      </h3>
                      
                      <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                        {(lang === 'hu' ? GLOSSARY_HU : GLOSSARY_EN).map((item, i) => (
                          <div key={i} className="bg-slate-950/40 border border-slate-800/80 p-4 rounded-lg flex flex-col justify-between">
                            <div>
                              <h4 className="text-sm font-bold text-amber-400 mb-1.5">{item.term}</h4>
                              <p className="text-xs text-slate-300 leading-relaxed mb-3">{item.definition}</p>
                            </div>
                            <a 
                              href={item.link} 
                              target="_blank" 
                              rel="noopener noreferrer" 
                              className="text-[10px] text-amber-500 hover:underline flex items-center gap-1 mt-2 self-start"
                            >
                              {lang === 'hu' ? 'Hivatalos kutatás' : 'Official research'} ↗
                            </a>
                          </div>
                        ))}
                      </div>
                    </div>
                  )}

                </section>

              </main>

              {}
              {showConfirmModal && (
                <div className="fixed inset-0 z-50 bg-slate-950/80 backdrop-blur-sm flex items-center justify-center p-4 font-sans">
                  <div className="bg-slate-900 border border-amber-500/30 rounded-xl max-w-md w-full p-6 shadow-2xl">
                    <div className="flex items-center gap-3 text-amber-400 mb-4">
                      <svg className="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" /></svg>
                      <h3 className="text-lg font-bold">
                        {lang === 'hu' ? 'Hosszú lekérdezési tartomány' : 'Large Date Range'}
                      </h3>
                    </div>
                    
                    <p className="text-sm text-slate-300 leading-relaxed mb-6">
                      {lang === 'hu' 
                        ? 'A kiválasztott intervallum meghaladja a 14 napot. A nagy mennyiségű adat letöltése és feldolgozása hosszabb időt vehet igénybe és leterhelheti a hálózatot. Biztosan folytatni szeretné?' 
                        : 'The chosen date range is larger than 14 days. Fetching and loading multiple datasets might take more time and strain network bandwidth. Are you sure you want to continue?'}
                    </p>

                    <div className="flex gap-3 justify-end">
                      <button 
                        onClick={() => setShowConfirmModal(false)}
                        className="px-4 py-2 bg-slate-800 hover:bg-slate-700 text-slate-300 rounded text-sm transition"
                      >
                        {lang === 'hu' ? 'Mégse' : 'Cancel'}
                      </button>
                      <button 
                        onClick={executeFetch}
                        className="px-4 py-2 bg-gradient-to-r from-amber-500 to-orange-600 hover:from-amber-600 hover:to-orange-700 text-slate-950 font-bold rounded text-sm transition shadow-lg shadow-amber-500/20"
                      >
                        {lang === 'hu' ? 'Igen, folytatás' : 'Yes, continue'}
                      </button>
                    </div>
                  </div>
                </div>
              )}

              {}
              {fullscreenElement && (
                <div className="fixed inset-0 z-50 bg-slate-950 flex flex-col items-center justify-center p-4 font-sans">
                  <button 
                    onClick={() => setFullscreenElement(null)}
                    className="absolute top-4 right-4 bg-slate-800 text-slate-100 hover:bg-slate-700 px-4 py-2 rounded-lg font-bold text-xs border border-slate-700 transition flex items-center gap-2"
                  >
                    <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M6 18L18 6M6 6l12 12" /></svg>
                    {lang === 'hu' ? 'Bezárás (ESC)' : 'Close (ESC)'}
                  </button>
                  
                  <div className="text-center mb-4">
                    <h3 className="text-sm font-mono tracking-widest text-amber-400 uppercase">
                      {fullscreenElement === 'disk' 
                        ? (lang === 'hu' ? 'Napkorong Vetület (Interaktív)' : 'Interactive Sun Disk Projection')
                        : (lang === 'hu' ? 'Heliocentrikus Pálya Terjedés' : 'Heliocentric Orbit Propagation')
                      }
                    </h3>
                  </div>

                  <div className="bg-slate-900 border border-slate-800 rounded-2xl overflow-hidden p-6 shadow-2xl flex justify-center items-center relative">
                    {fullscreenElement === 'disk' ? (
                      <div className="relative">
                        <canvas 
                          ref={fullscreenSunDiskCanvasRef} 
                          width={540} 
                          height={540} 
                          onMouseMove={handleMouseMoveSunDisk}
                          onMouseLeave={handleMouseLeaveSunDisk}
                          className="max-h-[80vh] aspect-square cursor-crosshair"
                        />
                        
                        {hoveredCmeDisk && (
                          <div 
                            className="fixed z-50 bg-slate-950/95 border border-amber-500/80 p-3.5 rounded-lg shadow-2xl pointer-events-none max-w-xs transition-opacity duration-150 text-xs text-left"
                            style={{
                              left: `${mousePos.x + 15}px`,
                              top: `${mousePos.y + 15}px`,
                            }}
                          >
                            <p className="text-[10px] font-mono text-amber-400 font-bold mb-1.5 tracking-wider uppercase">
                              {lang === 'hu' ? 'CME FORRÁSKOORDINÁTÁK' : 'CME SOURCE PROFILE'}
                            </p>
                            <h4 className="text-xs font-bold text-slate-100 mb-2 border-b border-slate-800 pb-1.5">
                              {hoveredCmeDisk.activityID}
                            </h4>
                            <div className="space-y-1.5 text-[11px] text-slate-300 font-sans">
                              <p><strong className="text-slate-400">{lang === 'hu' ? 'Napfolt' : 'AR Region'}:</strong> {hoveredCmeDisk.sourceLocation || 'N/A'}</p>
                              <p><strong className="text-slate-400">{lang === 'hu' ? 'Kezdet' : 'Start time'}:</strong> {hoveredCmeDisk.startTime}</p>
                              
                              <div className="mt-2 pt-2 border-t border-slate-800 space-y-1 text-slate-200">
                                <p className="text-[10px] text-amber-500 font-bold uppercase tracking-tight">
                                  {lang === 'hu' ? 'Eredeti kitörési koordináták:' : 'Original coordinates:'}
                                </p>
                                <p className="font-mono bg-slate-900/60 p-1 rounded border border-slate-800/50">
                                  Lat: {projectCoordinatesToEndDate(hoveredCmeDisk, endDate).originalLat}°, Lon: {projectCoordinatesToEndDate(hoveredCmeDisk, endDate).originalLon}°
                                </p>
                                
                                <p className="text-[10px] text-green-400 font-bold uppercase tracking-tight mt-1.5">
                                  {lang === 'hu' ? 'Záródátumra vetített koordináták:' : 'Projected (At End Date):'}
                                </p>
                                <p className="font-mono bg-slate-900/60 p-1 rounded border border-slate-800/50 text-green-300">
                                  Lat: {projectCoordinatesToEndDate(hoveredCmeDisk, endDate).latitude}°, Lon: {projectCoordinatesToEndDate(hoveredCmeDisk, endDate).longitude}°
                                </p>
                              </div>
                            </div>
                          </div>
                        )}
                      </div>
                    ) : (
                      <canvas 
                        ref={fullscreenOrbitCanvasRef} 
                        width={540} 
                        height={540} 
                        className="max-h-[80vh] aspect-square"
                      />
                    )}
                  </div>
                </div>
              )}

              <footer className="bg-slate-950 border-t border-slate-900 px-6 py-4 text-center text-xs text-slate-500">
                <p>© 2026 Space Weather Observatory. Az adatok közvetlenül a NASA Space Weather Database of Notifications, Knowledge, and Information (DONKI) rendszeréből származnak.</p>
              </footer>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
