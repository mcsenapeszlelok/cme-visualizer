        async function computeSolarParameters(dateStr) {
            let resultData;
            let attempt = 0;
            let url;
            const maxAttempts = 3;

            console.debug("compute start");

            try {
                console.debug("attempt to call api");
                let response;

                // Újrapróbálkozási logika
                while (attempt < maxAttempts) {
                    try {
                        attempt++;
                        // Feltételezzük, hogy az endDate, timeStr, lat, lon változók elérhetőek a külső scope-ból
                        //url = `http://localhost:8000/api/ephemeris?date=${dateStr}`;
                        //url = 'http://localhost:8000/api/ephemeris?date=2026-06-30&time=13:02:00&lat=47.4983&lon=20.0408';
                        url = `https://sun-ephem.vercel.app/api/ephemeris?date=${dateStr}`;
                        console.debug(url);
                        response = await fetch(url);

                        if (response.ok) break;

                        if (attempt < maxAttempts) {
                            await new Promise(resolve => setTimeout(resolve, attempt * 1000));
                        }
                    } catch (err) {
                        if (attempt >= maxAttempts) throw err;
                        await new Promise(resolve => setTimeout(resolve, attempt * 1000));
                    }
                }
                console.debug("api call attempted");
                // Ha sikeres volt az API hívás, feldolgozzuk
                if (response && response.ok) {
                    console.debug("api call responded");
                    const data = await response.json();
                    
                    if (data) {
                        // EGYSÉGESÍTÉS: Kivesszük a formázott értékeket, de tiszta P, B0, L0 neveket adunk nekik
                        console.debug("api respond ephemeris");
                        resultData = {
                            P: data.efemeriszek.P,
                            B0: data.efemeriszek.B0,
                            L0: data.efemeriszek.L0,
                            CR: data.efemeriszek.CR
                        };
                    } else {
                        console.debug("api did not returne ephemeris");                        
                    }
                    
                } else {
                    console.debug("Repsones error");
                    console.debug(response);
                }
            } catch (err) {
                console.warn("API hiba történt, átváltás matematikai számításra...", err);
                // opcionálisan itt lehetne setError
            }

            if (!resultData) {
                console.debug("No ephem from api -> running fallback math");
                const d = new Date(dateStr);
                const dayOfYear = Math.floor((d - new Date(d.getFullYear(), 0, 0)) / (1000 * 60 * 60 * 24));
                const P = 26.3 * Math.sin((2 * Math.PI * (dayOfYear - 105)) / 365.25);
                const B0 = 7.25 * Math.sin((2 * Math.PI * (dayOfYear - 250)) / 365.25);
                const baseEpochMs = new Date('2026-01-01T00:00:00Z').getTime();
                const diffMs = d.getTime() - baseEpochMs;
                const days = diffMs / (1000 * 60 * 60 * 24);
                const rotationPeriodDays = 27.2753;
                const L0 = (360 - ((days % rotationPeriodDays) / rotationPeriodDays) * 360) % 360;

                resultData = {
                    P: `${P.toFixed(2)}°`,  // Fokjellel látjuk el, hogy egyezzen az API formátumával
                    B0: `${B0.toFixed(2)}°`,
                    L0: `${L0.toFixed(1)}°`,
                    CR: "0"
                };
                console.debug("Fallback kész:", resultData);
            }

            console.debug("use ephemeris", resultData);
            return resultData;
        }

          };

          // Leave Start Date untouched, de megakadályozzuk, hogy a záró dátum korábbi legyen, mint a kezdő
          const handleEndDateChange = (e) => {
            const selectedEndDate = e.target.value;
            
            if (new Date(selectedEndDate) < new Date(startDate)) {
              // Ha korábbi dátumot választott, automatikusan a kezdő dátumra korlátozzuk
              setEndDate(startDate);
            } else {
              setEndDate(selectedEndDate);
            }
          };

          const renderOrbitCanvas = (canvas) => {
            if (!canvas) return;
            const ctx = canvas.getContext('2d');
            const width = canvas.width;
            const height = canvas.height;

            ctx.fillStyle = '#060a13';
            ctx.fillRect(0, 0, width, height);

            ctx.fillStyle = 'rgba(255, 255, 255, 0.35)';
            for (let i = 0; i < 40; i++) {
              const x = (Math.sin(i * 99) * 0.5 + 0.5) * width;
              const y = (Math.cos(i * 144) * 0.5 + 0.5) * height;
              ctx.fillRect(x, y, 1.2, 1.2);
            }

            const centerX = width / 2;
            const centerY = height / 2;
            const sunRadius = width * 0.06;

            ctx.strokeStyle = 'rgba(255, 255, 255, 0.08)';
            ctx.lineWidth = 1;
            const earthOrbitRadius = width * 0.38;
            ctx.beginPath();
            ctx.arc(centerX, centerY, earthOrbitRadius, 0, Math.PI * 2);
            ctx.stroke();

            const innerOrbitRadius = width * 0.18;
            const outerOrbitRadius = width * 0.31;
            ctx.beginPath();
            ctx.arc(centerX, centerY, innerOrbitRadius, 0, Math.PI * 2);
            ctx.arc(centerX, centerY, outerOrbitRadius, 0, Math.PI * 2);
            ctx.stroke();

            const sunGradient = ctx.createRadialGradient(centerX, centerY, 3, centerX, centerY, sunRadius);
            sunGradient.addColorStop(0, '#fffdf0');
            sunGradient.addColorStop(0.3, '#eab308');
            sunGradient.addColorStop(1, 'rgba(239, 68, 68, 0)');
            ctx.fillStyle = sunGradient;
            ctx.beginPath();
            ctx.arc(centerX, centerY, sunRadius * 1.8, 0, Math.PI * 2);
            ctx.fill();

            ctx.fillStyle = '#f59e0b';
            ctx.beginPath();
            ctx.arc(centerX, centerY, sunRadius * 0.6, 0, Math.PI * 2);
            ctx.fill();

            if (selectedCme) {
              const analysis = selectedCme.cmeAnalyses?.[0] || {};
              const angleDeg = analysis.longitude !== undefined ? analysis.longitude : 0; 
              const halfAngleDeg = analysis.halfAngle !== undefined ? analysis.halfAngle : 45;
              const speed = analysis.speed || 500;
              
              const centerAngleRad = (angleDeg * Math.PI) / 180;
              const spreadRad = (halfAngleDeg * Math.PI) / 180;
              const currentRadius = (simTime / 100) * (earthOrbitRadius + 25);

              if (currentRadius > sunRadius) {
                ctx.beginPath();
                const startRad = centerAngleRad - spreadRad;
                const endRad = centerAngleRad + spreadRad;
                ctx.arc(centerX, centerY, currentRadius, startRad, endRad);
                ctx.lineTo(centerX, centerY);
                ctx.closePath();

                const cmeGradient = ctx.createRadialGradient(centerX, centerY, sunRadius, centerX, centerY, currentRadius);
                if (speed >= 1000) {
                  cmeGradient.addColorStop(0, 'rgba(239, 68, 68, 0.04)');
                  cmeGradient.addColorStop(0.8, 'rgba(239, 68, 68, 0.38)');
                  cmeGradient.addColorStop(1, 'rgba(255, 255, 255, 0.75)');
                  ctx.strokeStyle = 'rgba(255, 255, 255, 0.65)';
                } else {
                  cmeGradient.addColorStop(0, 'rgba(245, 158, 11, 0.04)');
                  cmeGradient.addColorStop(0.8, 'rgba(245, 158, 11, 0.28)');
                  cmeGradient.addColorStop(1, 'rgba(239, 68, 68, 0.55)');
                  ctx.strokeStyle = 'rgba(239, 68, 68, 0.45)';
                }
                
                ctx.fillStyle = cmeGradient;
                ctx.fill();
                ctx.lineWidth = 1;
                ctx.stroke();
              }
            }

            const earthX = centerX + earthOrbitRadius;
            const earthY = centerY;
            ctx.fillStyle = '#3b82f6';
            ctx.beginPath();
            ctx.arc(earthX, earthY, 6, 0, Math.PI * 2);
            ctx.fill();
            ctx.strokeStyle = 'rgba(59, 130, 246, 0.4)';
            ctx.lineWidth = 2.5;
            ctx.beginPath();
            ctx.arc(earthX, earthY, 9, 0, Math.PI * 2);
            ctx.stroke();

            ctx.fillStyle = '#cbd5e1';
            ctx.font = 'bold 10px sans-serif';
            ctx.fillText(lang === 'hu' ? 'Föld' : 'Earth', earthX + 12, earthY + 3);

            const pspX = centerX + Math.cos(Math.PI / 4) * innerOrbitRadius;
            const pspY = centerY + Math.sin(Math.PI / 4) * innerOrbitRadius;
            ctx.fillStyle = '#ec4899';
            ctx.beginPath();
            ctx.arc(pspX, pspY, 3.5, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillText('PSP', pspX + 6, pspY - 4);

            const juiceX = centerX + Math.cos(Math.PI * 1.6) * outerOrbitRadius;
            const juiceY = centerY + Math.sin(Math.PI * 1.6) * outerOrbitRadius;
            ctx.fillStyle = '#a855f7';
            ctx.beginPath();
            ctx.arc(juiceX, juiceY, 3.5, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillText('Juice', juiceX + 6, juiceY + 3);

            const clipperX = centerX + Math.cos(Math.PI * 1.8) * outerOrbitRadius;
            const clipperY = centerY + Math.sin(Math.PI * 1.8) * outerOrbitRadius;
            ctx.fillStyle = '#14b8a6';
            ctx.beginPath();
            ctx.arc(clipperX, clipperY, 3.5, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillText('Clipper', clipperX + 6, clipperY - 4);
          };

          useEffect(() => {
            if (fullscreenElement === 'orbit') {
              renderOrbitCanvas(fullscreenOrbitCanvasRef.current);
            } else {
              renderOrbitCanvas(orbitCanvasRef.current);
            }
          }, [simTime, selectedCme, lang, fullscreenElement]);

          const projectCoordinatesToEndDate = (cme, targetDateStr) => {
            const analysis = cme.cmeAnalyses?.[0];
            if (!analysis) return { latitude: 0, longitude: 0, originalLat: 0, originalLon: 0, dtDays: 0 };

            const originalLat = analysis.latitude !== undefined ? analysis.latitude : 0;
            const originalLon = analysis.longitude !== undefined ? analysis.longitude : 0;

            const startMs = new Date(cme.startTime).getTime();
            const targetMs = new Date(targetDateStr).getTime();
            const dtMs = targetMs - startMs;
            const dtDays = dtMs / (1000 * 60 * 60 * 24);

            const rotationRatePerDay = 13.2; 
            let projectedLon = originalLon + (rotationRatePerDay * dtDays);

            while (projectedLon > 180) projectedLon -= 360;
            while (projectedLon < -180) projectedLon += 360;

            return {
              latitude: originalLat, 
              longitude: parseFloat(projectedLon.toFixed(1)),
              originalLat,
              originalLon,
              dtDays: parseFloat(dtDays.toFixed(2))
            };
          };

          const renderSunDiskCanvas = (canvas) => {
            if (!canvas) return;
            const ctx = canvas.getContext('2d');
            const width = canvas.width;
            const height = canvas.height;

            ctx.fillStyle = '#060a13';
            ctx.fillRect(0, 0, width, height);

            const centerX = width / 2;
            const centerY = height / 2;
            const sunRadius = width * 0.34;

            const backGlow = ctx.createRadialGradient(centerX, centerY, sunRadius * 0.9, centerX, centerY, sunRadius * 1.35);
            backGlow.addColorStop(0, 'rgba(245, 158, 11, 0.22)');
            backGlow.addColorStop(1, 'rgba(239, 68, 68, 0)');
            ctx.fillStyle = backGlow;
            ctx.beginPath();
            ctx.arc(centerX, centerY, sunRadius * 1.35, 0, Math.PI * 2);
            ctx.fill();

            const sunBase = ctx.createRadialGradient(centerX, centerY, 0, centerX, centerY, sunRadius);
            sunBase.addColorStop(0, '#fef08a');
            sunBase.addColorStop(0.72, '#f59e0b');
            sunBase.addColorStop(1, '#b45309');
            ctx.fillStyle = sunBase;
            ctx.beginPath();
            ctx.arc(centerX, centerY, sunRadius, 0, Math.PI * 2);
            ctx.fill();

            const tiltAngleDeg = endParams?.P;
            const tiltRad = (tiltAngleDeg * Math.PI) / 180;

            ctx.save();
            ctx.translate(centerX, centerY);
            ctx.rotate(tiltRad);

            ctx.strokeStyle = 'rgba(0, 0, 0, 0.12)';
            ctx.lineWidth = 1;

            for (let lat = -80; lat <= 80; lat += 10) {
              if (lat === 0) continue;
              const latRad = (lat * Math.PI) / 180;
              const y = Math.sin(latRad) * sunRadius;
              const r = Math.cos(latRad) * sunRadius;

              ctx.beginPath();
              ctx.ellipse(0, y, r, r * 0.15, 0, 0, Math.PI * 2);
              ctx.stroke();
            }

            for (let lon = -80; lon <= 80; lon += 10) {
              if (lon === 0) continue;
              const lonRad = (lon * Math.PI) / 180;
              const rX = Math.sin(lonRad) * sunRadius;

              ctx.beginPath();
              ctx.ellipse(0, 0, Math.abs(rX), sunRadius, 0, 0, Math.PI * 2);
              ctx.stroke();
            }

            ctx.strokeStyle = 'rgba(0, 0, 0, 0.35)';
            ctx.lineWidth = 1.6;
            ctx.beginPath();
            ctx.ellipse(0, 0, sunRadius, sunRadius * 0.15, 0, 0, Math.PI * 2);
            ctx.stroke();

            ctx.beginPath();
            ctx.moveTo(0, -sunRadius);
            ctx.lineTo(0, sunRadius);
            ctx.stroke();

            ctx.strokeStyle = '#ef4444';
            ctx.lineWidth = 2.2;
            ctx.beginPath();
            ctx.moveTo(0, -sunRadius - 15);
            ctx.lineTo(0, sunRadius + 15);
            ctx.stroke();

            ctx.fillStyle = '#ef4444';
            ctx.font = 'bold 12px monospace';
            ctx.textAlign = 'center';
            ctx.fillText('P', 0, -sunRadius - 22);

            ctx.restore();

            ctx.fillStyle = '#94a3b8';
            ctx.font = 'bold 13px sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('N', centerX, centerY - sunRadius - 18);
            ctx.fillText('E', centerX - sunRadius - 18, centerY);

            ctx.fillStyle = '#22c55e'; 
            ctx.strokeStyle = 'rgba(34, 197, 94, 0.4)';
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.arc(centerX, centerY, 5, 0, Math.PI * 2);
            ctx.fill();
            ctx.stroke();

            const getCanvasCoords = (lat, lon) => {
              const latRad = (lat * Math.PI) / 180;
              const lonRad = (lon * Math.PI) / 180;

              let x3d = sunRadius * Math.cos(latRad) * Math.sin(lonRad);
              let y3d = -sunRadius * Math.sin(latRad);
              let z3d = sunRadius * Math.cos(latRad) * Math.cos(lonRad);

              const isFront = z3d >= 0;
              const xRot = x3d * Math.cos(-tiltRad) - y3d * Math.sin(-tiltRad);
              const yRot = x3d * Math.sin(-tiltRad) + y3d * Math.cos(-tiltRad);

              return { x: centerX + xRot, y: centerY + yRot, isFront };
            };

            const itemsToRender = mapAllCmes ? cmeList : (selectedCme ? [selectedCme] : []);

            itemsToRender.forEach((cme) => {
              const projection = projectCoordinatesToEndDate(cme, endDate);
              const pos = getCanvasCoords(projection.latitude, projection.longitude);
              const isSelected = selectedCme?.activityID === cme.activityID;

              if (pos.isFront && Math.abs(projection.longitude) <= 90) {
                ctx.strokeStyle = '#f87171';
                ctx.lineWidth = isSelected ? 2.5 : 1.5;
                
                ctx.beginPath();
                ctx.arc(pos.x, pos.y, isSelected ? 9 : 6, 0, Math.PI * 2);
                ctx.stroke();

                ctx.beginPath();
                ctx.moveTo(pos.x - (isSelected ? 15 : 10), pos.y);
                ctx.lineTo(pos.x + (isSelected ? 15 : 10), pos.y);
                ctx.moveTo(pos.x, pos.y - (isSelected ? 15 : 10));
                ctx.lineTo(pos.x, pos.y + (isSelected ? 15 : 10));
                ctx.stroke();

                ctx.fillStyle = isSelected ? '#ffffff' : '#ef4444';
                ctx.beginPath();
                ctx.arc(pos.x, pos.y, isSelected ? 3.5 : 2.5, 0, Math.PI * 2);
                ctx.fill();

                ctx.fillStyle = '#ffffff';
                ctx.font = 'bold 9px monospace';
                ctx.fillText(cme.sourceLocation || 'AR', pos.x, pos.y - (isSelected ? 18 : 13));
              }
            });
          };

          useEffect(() => {
            if (fullscreenElement === 'disk') {
              renderSunDiskCanvas(fullscreenSunDiskCanvasRef.current);
            } else {
              renderSunDiskCanvas(sunDiskCanvasRef.current);
            }
          }, [cmeList, selectedCme, mapAllCmes, endDate, fullscreenElement, endParams]);

          const handleMouseMoveSunDisk = (e) => {
            const canvas = e.currentTarget;
            const rect = canvas.getBoundingClientRect();
            
            const relativeX = e.clientX - rect.left;
            const relativeY = e.clientY - rect.top;
            const x = relativeX * (canvas.width / rect.width);
            const y = relativeY * (canvas.height / rect.height);

            setMousePos({ x: e.clientX, y: e.clientY });

            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            const sunRadius = canvas.width * 0.34;
            const tiltRad = (endParams?.P * Math.PI) / 180;

            const getCanvasCoords = (lat, lon) => {
              const latRad = (lat * Math.PI) / 180;
              const lonRad = (lon * Math.PI) / 180;
              let x3d = sunRadius * Math.cos(latRad) * Math.sin(lonRad);
              let y3d = -sunRadius * Math.sin(latRad);
              const xRot = x3d * Math.cos(-tiltRad) - y3d * Math.sin(-tiltRad);
              const yRot = x3d * Math.sin(-tiltRad) + y3d * Math.cos(-tiltRad);
              return { x: centerX + xRot, y: centerY + yRot };
            };

            let found = null;
            const itemsToCheck = mapAllCmes ? cmeList : (selectedCme ? [selectedCme] : []);
            
            itemsToCheck.forEach((cme) => {
              const projection = projectCoordinatesToEndDate(cme, endDate);
              const pos = getCanvasCoords(projection.latitude, projection.longitude);

              const dist = Math.hypot(x - pos.x, y - pos.y);
              if (dist < 18) { 
                found = cme;
              }
            });

            setHoveredCmeDisk(found);
          };

          const handleMouseLeaveSunDisk = () => {
            setHoveredCmeDisk(null);
          };

          const handleFetchTrigger = (e) => {
            e.preventDefault();
            const d1 = new Date(startDate);
            const d2 = new Date(endDate);
            const diffTime = Math.abs(d2 - d1);
            const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));

            if (diffDays > MAXDATERANGE) {
              setShowConfirmModal(true);
            } else {
              executeFetch();
            }            
          };
          
          const executeFetch = async () => {
            setShowConfirmModal(false);
            setLoading(true);
            setError(null);

            // Pre-emptive rate limit check to prevent request if we know it's at zero
            if (apiRemaining !== null && apiRemaining <= 0) {
              setError(lang === 'hu' 
                ? "Túl sok kérés, próbálja 1-2 óra múlva." 
                : "Too many requests, please try again in 1-2 hours."
              );
              setLoading(false);
              return;
            }

            try {
              let response;
              let url = `https://api.nasa.gov/DONKI/CME?startDate=${startDate}&endDate=${endDate}&api_key=${API_KEY}`
              let attempt = 0;
              const maxAttempts = 3;
              
              while (attempt < maxAttempts) {
                try {
                  //response = await fetch(`https://api.nasa.gov/DONKI/CME?startDate=${startDate}&endDate=${endDate}&api_key=${API_KEY}`);
                  //const url = `https://kauai.ccmc.gsfc.nasa.gov/DONKI/WS/get/CME?startDate=${startDate}&endDate=${endDate}`
                  
                  console.debug(url)
                  response = await fetch(url);
                  //https://kauai.ccmc.gsfc.nasa.gov/DONKI/WS/get/CME?startDate=2017-01-03&endDate=2017-01-03
                  //https://api.nasa.gov/DONKI/CME?startDate=2017-01-03&endDate=2017-01-03&api_key=Qk8ff4ZQHXTGO5VRdOhYIvOymed0bcD1pFHSYtl6
                  
                  // Extract NASA's Rate-Limit headers
                  const limitHeader = response.headers.get('X-RateLimit-Limit');
                  const remainingHeader = response.headers.get('X-RateLimit-Remaining');
                  
                  if (limitHeader) setApiLimit(parseInt(limitHeader, 10));
                  if (remainingHeader) setApiRemaining(parseInt(remainingHeader, 10));
                  console.info("ApiLimit", apiLimit);
                  console.info("apiRemaining", apiRemaining);

                  if (response.status === 429 || (remainingHeader && parseInt(remainingHeader, 10) <= 0)) {
                    setApiRemaining(0);
                    throw new Error("RATE_LIMIT_EXCEEDED");
                  }

                  if (response.ok) {
                    break;
                  } else {
                    attempt++;
                    if (attempt >= maxAttempts) break;
                    await new Promise(resolve => setTimeout(resolve, attempt * 1000));
                  }
                } catch (err) {
                  //if (err.message === "RATE_LIMIT_EXCEEDED") throw err;
                  if (err.message === "RATE_LIMIT_EXCEEDED") {
                    url = `https://kauai.ccmc.gsfc.nasa.gov/DONKI/WS/get/CME?startDate=${startDate}&endDate=${endDate}`
                    attempt=0;
                  } 
                  attempt++;
                  if (attempt >= maxAttempts) throw err;
                  await new Promise(resolve => setTimeout(resolve, attempt * 1000));
                }
              }

              if (!response || !response.ok) {
                throw new Error("API_FAIL");
              }

              const data = await response.json();
              if (!data || data.length === 0) {
                throw new Error("EMPTY_DATA");
              }

              setCmeList(data);
              setSelectedCme(data[0]);
            } catch (err) {
              console.warn(err);
              if (err.message === "RATE_LIMIT_EXCEEDED" || (apiRemaining !== null && apiRemaining <= 0)) {
                setError(lang === 'hu' 
                  ? "Túl sok kérés, próbálja 1-2 óra múlva." 
                  : "Too many requests, please try again in 1-2 hours."
                );
              } else if (err.message === "EMPTY_DATA") {
                setError(lang === 'hu' ? 'Nincs rögzített adat a megadott intervallumban.' : 'No recorded events during this period.');
              } else {
                setError(lang === 'hu' ? 'A NASA API lekérdezés meghiúsult. Offline mód aktív.' : 'NASA API call failed. Using offline simulation backup.');
              }
              
              // Maintain consistent layout state with backups on error
              const fallback = lang === 'hu' ? DATA_HU : DATA_EN;
              setCmeList(fallback);
              setSelectedCme(fallback[0]);
            } finally {
              setLoading(false);
            }
            setRefreshTrigger(prev => prev + 1);
          };

          // Automatikus lekérdezés az oldal betöltődésekor
          useEffect(() => {
            executeFetch();
          }, []);
          
          return (
            <div className="min-h-screen bg-slate-950 text-slate-100 flex flex-col font-sans selection:bg-amber-500 selection:text-slate-950">
              
              <header className="bg-slate-900/80 backdrop-blur-md border-b border-slate-800 px-6 py-4 flex flex-col sm:flex-row items-center justify-between gap-4">
                <div className="flex items-center gap-3">
                  <div className="p-2 bg-gradient-to-br from-amber-500 to-orange-600 rounded-lg shadow-lg shadow-amber-500/20">
                    <svg className="w-6 h-6 text-slate-950" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                      <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2.5" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707m0-11.314l.707.707m11.314 11.314l.707-.707M12 8a4 4 0 100 8 4 4 0 000-8z" />
                    </svg>
                  </div>
                  <div>
                    <h1 className="text-xl font-bold tracking-tight bg-gradient-to-r from-amber-400 to-orange-500 bg-clip-text text-transparent">
                      CME Visualizer ({APPVERSION})
                    </h1>
                    <p className="text-xs text-slate-400 font-mono">
                      {lang === 'hu' ? 'Korona anyag kidobódás (CME) szimulátor' : 'Coronal Mass Ejection (CME) simulator'}
                    </p>
                  </div>
                </div>

                <div className="flex items-center gap-5">
                  <div className="flex items-center gap-1 bg-slate-950/60 p-1 rounded-lg border border-slate-800">
                    <button 
                      onClick={() => setLang('en')}
                      className={`px-2.5 py-1 rounded text-xs font-bold transition duration-150 ${lang === 'en' ? 'bg-amber-500 text-slate-950' : 'text-slate-400 hover:text-slate-200'}`}
                    >
                      EN
                    </button>
                    <button 
                      onClick={() => setLang('hu')}
                      className={`px-2.5 py-1 rounded text-xs font-bold transition duration-150 ${lang === 'hu' ? 'bg-amber-500 text-slate-950' : 'text-slate-400 hover:text-slate-200'}`}
                    >
                      HU
                    </button>
                  </div>

                  <div className="hidden md:flex gap-4 text-xs font-medium">
                    <a href="https://nap.mcse.hu/" target="_blank" rel="noopener noreferrer" className="text-amber-400 hover:underline">MCSE Nap szakcsoport ↗</a>
                    <a href="https://api.nasa.gov/" target="_blank" rel="noopener noreferrer" className="text-amber-400 hover:underline">NASA APIs ↗</a>
                    <a href="https://kauai.ccmc.gsfc.nasa.gov/DONKI/" target="_blank" rel="noopener noreferrer" className="text-slate-400 hover:text-slate-200">CCMC DONKI ↗</a>
                  </div>
                </div>
              </header>

              <main className="flex-1 max-w-7xl w-full mx-auto p-4 md:p-6 grid grid-cols-1 lg:grid-cols-12 gap-6">
                
                <section className="lg:col-span-4 flex flex-col gap-6">
                  
                  <div className="bg-slate-900 border border-slate-800 rounded-xl p-5 shadow-xl relative">
                    <div className="flex justify-between items-center mb-4">
                      <h2 className="text-sm font-semibold text-slate-300 uppercase tracking-wider flex items-center gap-2">
                        <svg className="w-4 h-4 text-amber-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 6V4m0 2a2 2 0 100 4m0-4a2 2 0 110 4m-6 8a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4m6 6v10m6-2a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4" /></svg>
                        {lang === 'hu' ? 'Paraméterek' : 'Parameters'}
                      </h2>
                    </div>

                    <form onSubmit={handleFetchTrigger} className="space-y-4 font-sans">
                      <div>
                        <label className="block text-xs font-medium text-slate-400 mb-1">{lang === 'hu' ? 'Kezdő Dátum' : 'Start Date'}</label>
                        <input 
                          type="date" 
                          value={startDate} 
                          onChange={handleStartDateChange}
                          className="w-full bg-slate-950 border border-slate-800 rounded px-3 py-2 text-sm text-slate-200 focus:outline-none focus:border-amber-500"
                        />
                      </div>

                      <div>
                        <label className="block text-xs font-medium text-slate-400 mb-1">{lang === 'hu' ? 'Záró Dátum' : 'End Date'}</label>
                        <input 
                          type="date" 
                          value={endDate} 
                          onChange={handleEndDateChange}
                          className="w-full bg-slate-950 border border-slate-800 rounded px-3 py-2 text-sm text-slate-200 focus:outline-none focus:border-amber-500"
                        />
                      </div>

                      <button 
                        type="submit" 
                        disabled={loading}
                        className="w-full mt-2 py-2 px-4 bg-gradient-to-r from-amber-500 to-orange-600 hover:from-amber-600 hover:to-orange-700 text-slate-950 font-bold rounded text-sm transition shadow-lg shadow-amber-500/10 hover:shadow-amber-500/20 flex items-center justify-center gap-2"
                      >
                        {loading ? (

                    <div className="bg-slate-900 border border-slate-800 rounded-xl p-5 shadow-xl font-sans">
                      <h3 className="text-sm font-bold text-slate-300 uppercase tracking-wider mb-4">
                        {lang === 'hu' ? 'Űridőjárás Fogalomtár & Források' : 'Space Weather References'}
                      </h3>
                      
                      <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                        {(lang === 'hu' ? GLOSSARY_HU : GLOSSARY_EN).map((item, i) => (
                          <div key={i} className="bg-slate-950/40 border border-slate-800/80 p-4 rounded-lg flex flex-col justify-between">
                            <div>
                              <h4 className="text-sm font-bold text-amber-400 mb-1.5">{item.term}</h4>
                              <p className="text-xs text-slate-300 leading-relaxed mb-3">{item.definition}</p>
                            </div>
                            <a 
                              href={item.link} 
                              target="_blank" 
                              rel="noopener noreferrer" 
                              className="text-[10px] text-amber-500 hover:underline flex items-center gap-1 mt-2 self-start"
                            >
                              {lang === 'hu' ? 'Bővebben' : 'More info'} ↗
                            </a>
                          </div>
                        ))}
                      </div>
                    </div>
                  )}

                </section>

              </main>

              {showConfirmModal && (
                <div className="fixed inset-0 z-[10000] bg-slate-950/80 backdrop-blur-sm flex items-center justify-center p-4 font-sans">
                  <div className="bg-slate-900 border border-amber-500/30 rounded-xl max-w-md w-full p-6 shadow-2xl">
                    <div className="flex items-center gap-3 text-amber-400 mb-4">
                      <svg className="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" /></svg>
                      <h3 className="text-lg font-bold">
                        {lang === 'hu' ? 'Hosszú lekérdezési tartomány' : 'Large Date Range'}
                      </h3>
                    </div>
                    
                    <p className="text-sm text-slate-300 leading-relaxed mb-6">
                      {lang === 'hu' 
                        ? `A kiválasztott intervallum meghaladja a ${MAXDATERANGE} napot. A nagy mennyiségű adat letöltése és feldolgozása hosszabb időt vehet igénybe és leterhelheti a hálózatot. Biztosan folytatni szeretné?` 
                        : `The chosen date range is larger than ${MAXDATERANGE} days. Fetching and loading multiple datasets might take more time and strain network bandwidth. Are you sure you want to continue?`}
                    </p>

                    <div className="flex gap-3 justify-end">
                      <button 
                        onClick={() => setShowConfirmModal(false)}
                        className="px-4 py-2 bg-slate-800 hover:bg-slate-700 text-slate-300 rounded text-sm transition"
                      >
                        {lang === 'hu' ? 'Mégse' : 'Cancel'}
                      </button>
                      <button 
                        onClick={executeFetch}
                        className="px-4 py-2 bg-gradient-to-r from-amber-500 to-orange-600 hover:from-amber-600 hover:to-orange-700 text-slate-950 font-bold rounded text-sm transition shadow-lg shadow-amber-500/20"
                      >
                        {lang === 'hu' ? 'Igen, folytatás' : 'Yes, continue'}
                      </button>
                    </div>
                  </div>
                </div>
              )}

              {fullscreenElement && (
                <div className="fixed inset-0 z-50 bg-slate-950 flex flex-col items-center justify-center p-4 font-sans">
                  <button 
                    onClick={() => setFullscreenElement(null)}
                    className="absolute top-4 right-4 bg-slate-800 text-slate-100 hover:bg-slate-700 px-4 py-2 rounded-lg font-bold text-xs border border-slate-700 transition flex items-center gap-2"
                  >
                    <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2.5" d="M6 18L18 6M6 6l12 12" /></svg>
                    {lang === 'hu' ? 'Bezárás (ESC)' : 'Close (ESC)'}
                  </button>
                  
                  <div className="text-center mb-4">
                    <h3 className="text-sm font-mono tracking-widest text-amber-400 uppercase">
                      {fullscreenElement === 'disk' 
                        ? (lang === 'hu' ? 'Napkorong (mutass a jelölésre)' : 'Solar Disk (Hover mouse on CME)')
                        : (lang === 'hu' ? 'CEM Terjedés' : 'CME  Propagation')
                      }
                    </h3>
                  </div>

                  <div className="bg-slate-900 border border-slate-800 rounded-2xl overflow-hidden p-6 shadow-2xl flex justify-center items-center relative">
                    {fullscreenElement === 'disk' ? (
                      <div className="relative">
                        <canvas 
                          ref={fullscreenSunDiskCanvasRef} 
                          width={540} 
                          height={540} 
                          onMouseMove={handleMouseMoveSunDisk}
                          onMouseLeave={handleMouseLeaveSunDisk}
                          className="max-h-[80vh] aspect-square cursor-crosshair"
                        />
                        
                        {hoveredCmeDisk && (
                          <div 
                            className="fixed z-[9999] bg-slate-950/95 border border-amber-500/80 p-3.5 rounded-lg shadow-2xl pointer-events-none max-w-xs transition-opacity duration-150 text-xs text-left"
                            style={{
                              left: `${mousePos.x + 15}px`,
                              top: `${mousePos.y + 15}px`,
                            }}
                          >
                            <p className="text-[10px] font-mono text-amber-400 font-bold mb-1.5 tracking-wider uppercase">
                              {lang === 'hu' ? 'CME FORRÁSKOORDINÁTÁK' : 'CME SOURCE PROFILE'}
                            </p>
                            <h4 className="text-xs font-bold text-slate-100 mb-2 border-b border-slate-800 pb-1.5 font-sans">
                              {hoveredCmeDisk.activityID}
                            </h4>
                            <div className="space-y-1.5 text-[11px] text-slate-300 font-sans">
                              <p><strong className="text-slate-400">{lang === 'hu' ? 'Napfolt' : 'AR Region'}:</strong> {hoveredCmeDisk.sourceLocation || 'N/A'}</p>
                              <p><strong className="text-slate-400">{lang === 'hu' ? 'Kezdet' : 'Start time'}:</strong> {hoveredCmeDisk.startTime}</p>
                              
                              <div className="mt-2 pt-2 border-t border-slate-800 space-y-1 text-slate-200">
                                <p className="text-[10px] text-amber-500 font-bold uppercase tracking-tight">
                                  {lang === 'hu' ? 'Eredeti kitörési koordináták:' : 'Original coordinates:'}
                                </p>
                                <p className="font-mono bg-slate-900/60 p-1 rounded border border-slate-800/50 font-sans font-semibold">
                                  Lat: {projectCoordinatesToEndDate(hoveredCmeDisk, endDate).originalLat}°, Lon: {projectCoordinatesToEndDate(hoveredCmeDisk, endDate).originalLon}°
                                </p>
                                
                                <p className="text-[10px] text-green-400 font-bold uppercase tracking-tight mt-1.5">
                                  {lang === 'hu' ? 'Záródátumra vetített koordináták:' : 'Projected (At End Date):'}
                                </p>
                                <p className="font-mono bg-slate-900/60 p-1 rounded border border-slate-800/50 text-green-300 font-sans font-semibold font-semibold font-semibold">
                                  Lat: {projectCoordinatesToEndDate(hoveredCmeDisk, endDate).latitude}°, Lon: {projectCoordinatesToEndDate(hoveredCmeDisk, endDate).longitude}°
                                </p>
                              </div>
                            </div>
                          </div>
                        )}
                      </div>
                    ) : (
                      <canvas 
                        ref={fullscreenOrbitCanvasRef} 
                        width={540} 
                        height={540} 
                        className="max-h-[80vh] aspect-square"
                      />
                    )}
                  </div>
                </div>
              )}

              <footer className="bg-slate-950 border-t border-slate-900 px-6 py-4 text-center text-s text-slate-500 font-sans">
                <p>© 2026 Boldi, <a href="https://nap.mcse.hu/" target="_blank" rel="noopener noreferrer" className="text-amber-400 hover:underline">MCSE Napészlelő Szakcsoport</a>  Adat Forrás/Data Source: NASA Space Weather Database of Notifications, Knowledge, and Information (DONKI).</p>
              </footer>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
